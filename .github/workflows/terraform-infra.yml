name: Terraform (dev)

on:
  pull_request:
    paths:
      - 'modules/**'
      - 'environments/dev/**'

  workflow_dispatch:
    inputs:
      force_apply:
        description: "Force Terraform apply"
        type: choice
        options:
          - "false"
          - "true"
        default: "false"

permissions:
  id-token: write
  contents: read
  pull-requests: write

concurrency:
  group: terraform-dev
  cancel-in-progress: false

jobs:

  plan:
    runs-on: ubuntu-latest

    outputs:
      changes: ${{ steps.plan.outputs.changes }}

    env:
      TF_WORKING_DIR: environments/dev
      TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform.d/plugin-cache
      TF_INPUT: false
      TF_IN_AUTOMATION: true
      TF_VAR_ssh_allowed_ip: ${{ vars.MY_PUBLIC_IP }}

    steps:

      - uses: actions/checkout@v4

      - uses: ./.github/actions/terraform-setup
        with:
          working_dir: environments/dev
          aws_role: ${{ vars.AWS_TERRAFORM_ROLE_ARN }}
          aws_region: ${{ vars.AWS_REGION }}

      - name: Terraform Format
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: TFLint Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: tflint --init

      - name: Run TFLint
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          tflint --recursive | tee tflint.txt

          echo "## Terraform Lint Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** dev" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat tflint.txt >> $GITHUB_STEP_SUMMARY

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          set +e
          terraform plan -input=false -no-color -compact-warnings -detailed-exitcode -out=tfplan
          exitcode=$?

          if [ $exitcode -eq 1 ]; then
            echo "Terraform plan failed"
            exit 1
          fi

          if [ $exitcode -eq 2 ]; then
            echo "changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "changes=false" >> "$GITHUB_OUTPUT"
          fi

          terraform show -json tfplan > tfplan.json

      - name: Terraform Plan Summary
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "## Terraform Plan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** dev" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          terraform show -no-color tfplan | grep -E "Plan:|No changes" >> $GITHUB_STEP_SUMMARY

      - name: Generate Terraform Plan Diff
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "### Terraform Plan (dev)" > plan.md
          echo "" >> plan.md
          echo '```diff' >> plan.md
          terraform show -no-color tfplan >> plan.md
          echo '```' >> plan.md

      - name: Comment Terraform Plan
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: ${{ env.TF_WORKING_DIR }}/plan.md

      # -------------------------
      # Infracost
      # -------------------------

      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Generate Infracost breakdown
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          infracost breakdown \
            --path tfplan.json \
            --format json \
            --out-file infracost.json

      - name: Generate Infracost diff
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}
        run: |
          infracost diff \
            --path tfplan.json \
            --format json \
            --out-file infracost-diff.json

      - name: Show Infracost summary
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "## Infracost Estimate" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          infracost output \
            --path infracost-diff.json \
            --format github-comment >> $GITHUB_STEP_SUMMARY

      - name: Post Infracost comment
        if: github.event_name == 'pull_request'
        uses: infracost/actions/comment@v1
        with:
          path: ${{ env.TF_WORKING_DIR }}/infracost-diff.json

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: ${{ env.TF_WORKING_DIR }}/tfplan


  apply:
    needs: plan
    if: |
      github.event_name == 'workflow_dispatch' &&
      (
        needs.plan.outputs.changes == 'true' ||
        github.event.inputs.force_apply == 'true'
      )
    runs-on: ubuntu-latest
    environment: dev

    env:
      TF_WORKING_DIR: environments/dev
      TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform.d/plugin-cache
      TF_INPUT: false
      TF_IN_AUTOMATION: true
      TF_VAR_ssh_allowed_ip: ${{ vars.MY_PUBLIC_IP }}

    steps:

      - uses: actions/checkout@v4

      - uses: ./.github/actions/terraform-setup
        with:
          working_dir: environments/dev
          aws_role: ${{ vars.AWS_TERRAFORM_ROLE_ARN }}
          aws_region: ${{ vars.AWS_REGION }}

      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan
          path: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -input=false -auto-approve tfplan
